plugins {
    id 'java'
    id 'net.neoforged.gradle.userdev' version '7.0.145'
}

version = '1.0.0'
group = 'com.antipistonspitting'

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

minecraft {
    accessTransformers {
        file('src/main/resources/META-INF/accesstransformer.cfg')
    }
}

dependencies {
    implementation "net.neoforged:neoforge:21.1.86"
}

tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
        minecraft_version      : "1.21.1",
        minecraft_version_range: "[1.21.1,1.22)",
        neo_version            : "21.1.86",
        neo_version_range      : "[21.1.86,)",
        loader_version_range   : "[2,)",
        mod_id                 : "antipistonspitting",
        mod_name               : "AntiPistonSpitting",
        mod_license            : "MIT",
        mod_version            : project.version,
        mod_authors            : "AntiPistonSpitting",
        mod_description        : "Prevents piston spitting - blocks always stay attached to sticky pistons"
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}
